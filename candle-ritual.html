<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Candle Ritual — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      padding:40px 20px; 
      margin:0; 
      min-height:100vh; 
      overflow-x:hidden;
    }
    h1 { font-size:3.2em; text-shadow:0 0 30px #ff3366, 0 0 60px #9f00ff; margin-bottom:10px; }
    .subtitle { font-size:1.35em; opacity:0.85; margin-bottom:50px; color:#ff99ff; }

    /* Candles */
    .candles { display:flex; justify-content:center; gap:50px; margin:70px 0; flex-wrap:wrap; }
    .candle { 
      width:75px; height:145px; background:linear-gradient(#1a1a1a,#111); 
      border-radius:15px 15px 6px 6px; position:relative; cursor:pointer; 
      box-shadow:0 0 35px rgba(255,51,102,0.8); transition:all 0.4s;
    }
    .candle::before { 
      content:''; position:absolute; top:-32px; left:50%; transform:translateX(-50%); 
      width:26px; height:36px; background:#ffdd88; border-radius:50% 50% 35% 35%; 
      box-shadow:0 0 30px #ffdd88, 0 0 55px #ff8800;
    }
    .candle.lit { transform:scale(1.3); box-shadow:0 0 70px #ff3366; }

    /* Runes */
    .runes { display:flex; justify-content:center; gap:70px; margin:80px 0; }
    .rune { 
      width:110px; height:110px; background:#1a0033; border:4px solid #9900ff; 
      border-radius:50%; display:flex; align-items:center; justify-content:center; 
      font-size:1.1em; color:#ffccff; box-shadow:0 0 40px #9900ff; cursor:pointer; 
      transition:all 0.4s; line-height:1.3; text-align:center; padding:10px;
    }
    .rune.correct { box-shadow:0 0 80px #00ffff; border-color:#00ffff; color:#00ffff; transform:scale(1.2); }

    /* Desire Offering */
    #offering { 
      max-width:620px; margin:60px auto; padding:50px; 
      background:rgba(20,0,30,0.95); border:3px solid #ff3366; 
      border-radius:20px; box-shadow:0 0 60px rgba(255,51,102,0.5);
    }
    input { 
      width:100%; padding:18px; font-size:1.3em; background:#111; color:#ffddaa; 
      border:3px solid #ff3366; margin-bottom:30px; text-align:center;
    }
    button { 
      padding:18px 60px; background:#330011; color:#ff3366; border:4px solid #ff3366; 
      font-size:1.5em; cursor:pointer; transition:all 0.3s;
    }
    button:hover { background:#ff3366; color:#0a0008; }

    /* Contract Popup */
    #contractPopup { 
      display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
      background:rgba(10,0,8,0.95); z-index:1000; align-items:center; justify-content:center;
    }
    .popup-content { 
      background:rgba(20,0,30,0.98); border:5px solid #ff3366; border-radius:20px; 
      padding:60px 50px; max-width:700px; box-shadow:0 0 100px #9f00ff; text-align:center;
    }
  </style>
</head>
<body>

  <h1>THE CANDLE RITUAL</h1>
  <p class="subtitle" id="stage-title">Light the three chosen flames</p>

  <!-- CANDLES -->
  <div id="candleStage">
    <div class="candles" id="candlesContainer"></div>
  </div>

  <!-- RUNES -->
  <div id="runeStage" style="display:none">
    <p class="subtitle">Speak the words in the correct order</p>
    <div class="runes" id="runesContainer"></div>
  </div>

  <!-- DESIRE OFFERING -->
  <div id="offeringStage" style="display:none">
    <h1>OFFER YOUR DESIRE</h1>
    <div id="offering">
      <p style="font-size:1.6em; margin-bottom:30px;">What do you crave most?</p>
      <input type="text" id="desireInput" placeholder="Speak your desire...">
      <button onclick="submitDesire()">OFFER IT TO VESPERATH</button>
    </div>
