<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Initiation Ritual — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { background:#0a0008; color:#ff3366; font-family:'Cinzel Decorative',serif; text-align:center; padding:40px 20px; margin:0; min-height:100vh; overflow-x:hidden; }
    h1 { font-size:3.4em; text-shadow:0 0 30px #ff3366, 0 0 70px #9f00ff; margin:20px 0 10px; }
    .subtitle { font-size:1.4em; opacity:0.9; color:#ff99ff; margin-bottom:50px; }

    .candles { display:flex; justify-content:center; gap:60px; margin:70px 0; flex-wrap:wrap; }
    .candle { width:80px; height:160px; background:linear-gradient(#1a1a1a,#111); border-radius:18px 18px 8px 8px; position:relative; cursor:pointer; box-shadow:0 0 35px rgba(255,51,102,0.7); transition:all 0.4s; }
    .candle::before { content:''; position:absolute; top:-38px; left:50%; transform:translateX(-50%); width:28px; height:40px; background:#ffdd88; border-radius:50% 50% 35% 35%; box-shadow:0 0 30px #ffdd88, 0 0 55px #ff8800; }
    .candle.lit { box-shadow:0 0 70px #ff3366; transform:scale(1.25); }

    .runes { display:flex; justify-content:center; gap:70px; margin:80px 0; }
    .rune { width:110px; height:110px; background:#1a0033; border:4px solid #9900ff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1em; color:#ffccff; box-shadow:0 0 40px #9900ff; cursor:pointer; transition:all 0.4s; padding:10px; line-height:1.3; }
    .rune.correct { box-shadow:0 0 80px #00ffff; border-color:#00ffff; color:#00ffff; transform:scale(1.2); }

    #contractPopup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,0,8,0.97); z-index:1000; align-items:center; justify-content:center; }
    .popup-content { background:rgba(20,0,30,0.98); border:5px solid #ff3366; border-radius:20px; padding:60px 50px; max-width:680px; box-shadow:0 0 100px #9f00ff; }
  </style>
</head>
<body>

  <h1 id="stageTitle">THE CANDLE RITUAL</h1>
  <p class="subtitle" id="stageSubtitle">Light all three flames...</p>

  <!-- Candles -->
  <div id="candleStage">
    <div class="candles" id="candlesContainer"></div>
  </div>

  <!-- Runes -->
  <div id="runeStage" style="display:none">
    <div class="runes" id="runesContainer"></div>
  </div>

  <!-- Contract Popup -->
  <div id="contractPopup">
    <div class="popup-content">
      <h1>THE CONTRACT IS SEALED</h1>
      <p style="font-size:1.5em; color:#e8d5ff; margin:30px 0;">Your desire has been heard.<br>Vesperath accepts you.</p>
      <a href="https://forms.gle/xzatapBg9LiMEsxB7" target="_blank" style="display:inline-block; padding:20px 60px; background:#ff3366; color:#0a0008; font-size:1.7em; text-decoration:none; border-radius:8px;">SIGN THE CONTRACT</a>
    </div>
  </div>

  <script>
    let currentStage = 0;

    // ==================== CANDLES ====================
    function createCandles() {
      const container = document.getElementById('candlesContainer');
      container.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const candle = document.createElement('div');
        candle.className = 'candle';
        candle.onclick = () => {
          candle.classList.add('lit');
          if (document.querySelectorAll('.candle.lit').length === 3) {
            setTimeout(nextToRunes, 800);
          }
        };
        container.appendChild(candle);
      }
    }

    function nextToRunes() {
      document.getElementById('candleStage').style.display = 'none';
      document.getElementById('runeStage').style.display = 'block';
      document.getElementById('stageTitle').textContent = 'THE RUNE TRIAL';
      document.getElementById('stageSubtitle').textContent = 'Speak the words in the correct order...';
      initRunes();
    }

    // ==================== RUNES (Complicated) ====================
    const runeWords = ["OBEY", "BLEED", "SUBMIT"];
    let secretOrder = [];
    let runeProgress = 0;

    function initRunes() {
      secretOrder = [...runeWords].sort(() => Math.random() - 0.5);
      runeProgress = 0;
      const container = document.getElementById('runesContainer');
      container.innerHTML = '';

      runeWords.forEach(word => {
        const rune = document.createElement('div');
        rune.className = 'rune';
        rune.textContent = word;
        rune.onclick = () => handleRune(rune, word);
        container.appendChild(rune);
      });
    }

    function handleRune(runeElement, clickedWord) {
      if (clickedWord === secretOrder[runeProgress]) {
        runeElement.classList.add('correct');
        runeProgress++;

        if (runeProgress === 3) {
          setTimeout(() => {
            document.getElementById('contractPopup').style.display = 'flex';
          }, 1000);
        }
      } else {
        // Reset runes
        document.querySelectorAll('.rune').forEach(r => r.classList.remove('correct'));
        runeProgress = 0;
      }
    }

    // Start everything
    window.onload = createCandles;
  </script>
</body>
</html>
