<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Candle Ritual — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      padding:40px 20px; 
      margin:0; 
      min-height:100vh; 
    }
    h1 { font-size:3.2em; text-shadow:0 0 30px #ff3366, 0 0 60px #9f00ff; margin-bottom:10px; }
    .subtitle { font-size:1.35em; opacity:0.85; margin-bottom:50px; color:#ff99ff; }

    .candles { display:flex; justify-content:center; gap:50px; margin:70px 0; flex-wrap:wrap; }
    .candle { 
      width:75px; height:145px; background:linear-gradient(#1a1a1a,#111); 
      border-radius:15px 15px 6px 6px; position:relative; cursor:pointer; 
      box-shadow:0 0 35px rgba(255,51,102,0.8); transition:all 0.4s;
    }
    .candle::before { 
      content:''; position:absolute; top:-32px; left:50%; transform:translateX(-50%); 
      width:26px; height:36px; background:#ffdd88; border-radius:50% 50% 35% 35%; 
      box-shadow:0 0 30px #ffdd88, 0 0 55px #ff8800;
    }
    .candle.glow { box-shadow:0 0 70px #00ff88; transform:scale(1.15); }
    .candle.lit { box-shadow:0 0 80px #ff3366; transform:scale(1.25); }
    .candle.wrong { animation: blowOut 0.7s forwards; }
    @keyframes blowOut { 100% { opacity:0.2; transform:scale(0.5); } }

    .runes { display:flex; justify-content:center; gap:70px; margin:80px 0; }
    .rune { 
      width:110px; height:110px; background:#1a0033; border:4px solid #9900ff; 
      border-radius:50%; display:flex; align-items:center; justify-content:center; 
      font-size:1.1em; color:#ffccff; box-shadow:0 0 40px #9900ff; cursor:pointer; 
      transition:all 0.4s; padding:10px; line-height:1.3;
    }
    .rune.correct { box-shadow:0 0 80px #00ffff; border-color:#00ffff; color:#00ffff; transform:scale(1.2); }

    #offering { max-width:620px; margin:60px auto; padding:50px; background:rgba(20,0,30,0.95); border:3px solid #ff3366; border-radius:20px; box-shadow:0 0 60px rgba(255,51,102,0.5); }
    input, button { width:100%; padding:18px; font-size:1.3em; margin-bottom:20px; }
    button { background:#330011; color:#ff3366; border:4px solid #ff3366; cursor:pointer; }
    button:hover { background:#ff3366; color:#0a0008; }
  </style>
</head>
<body>

  <h1>THE CANDLE RITUAL</h1>
  <p class="subtitle" id="stage-title">The void has chosen three candles.<br>Click them in the correct order.</p>

  <div class="candles" id="candlesContainer"></div>

  <div id="runeStage" style="display:none">
    <p class="subtitle">Speak the words in the correct order</p>
    <div class="runes" id="runesContainer"></div>
  </div>

  <div id="offeringStage" style="display:none">
    <h1>OFFER YOUR DESIRE</h1>
    <div id="offering">
      <p style="font-size:1.6em;margin-bottom:30px;">What do you crave most?</p>
      <input type="text" id="desireInput" placeholder="Speak your desire...">
      <button onclick="submitDesire()">OFFER IT TO VESPERATH</button>
    </div>
  </div>

  <script>
    let sequence = [];
    let currentIndex = 0;

    function createCandles() {
      const container = document.getElementById('candlesContainer');
      container.innerHTML = '';
      currentIndex = 0;

      for (let i = 0; i < 5; i++) {
        const candle = document.createElement('div');
        candle.className = 'candle';
        candle.dataset.id = i;
        candle.addEventListener('click', () => clickCandle(candle));
        container.appendChild(candle);
      }

      const allCandles = Array.from(container.children);
      const chosen = allCandles.sort(() => Math.random() - 0.5).slice(0,3);
      sequence = .sort(() => Math.random() - 0.5);

      chosen.forEach(c => c.classList.add('glow'));
    }

    function clickCandle(candle) {
      if (candle.classList.contains('lit')) return;

      if (sequence === candle) {
        candle.classList.add('lit');
        candle.classList.remove('glow');
        currentIndex++;

        if (currentIndex === 3) {
          document.getElementById('stage-title').textContent = "The flames accept you...";
          setTimeout(() => {
            document.getElementById('candleStage').style.display = 'none';
            document.getElementById('runeStage').style.display = 'block';
          }, 1200);
        }
      } else {
        document.querySelectorAll('.candle').forEach(c => c.classList.add('wrong'));
        setTimeout(createCandles, 900);
      }
    }

    function submitDesire() {
      const input = document.getElementById('desireInput').value.trim();
      if (input.length < 4) return alert("Your desire must be worthy...");
      alert("🔥 Your desire has been accepted.");
    }

    window.onload = createCandles;
  </script>
</body>
</html>
