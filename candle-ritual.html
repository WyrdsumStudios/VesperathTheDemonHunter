<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Candle Ritual — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      padding:40px 20px; 
      margin:0; 
      min-height:100vh; 
      overflow-x:hidden;
    }
    h1 { font-size:3.2em; text-shadow:0 0 30px #ff3366, 0 0 60px #9f00ff; margin-bottom:10px; }
    .subtitle { font-size:1.35em; opacity:0.85; margin-bottom:50px; color:#ff99ff; }

    /* Candles */
    .candles { display:flex; justify-content:center; gap:50px; margin:70px 0; flex-wrap:wrap; }
    .candle { 
      width:75px; height:145px; background:linear-gradient(#1a1a1a,#111); 
      border-radius:15px 15px 6px 6px; position:relative; cursor:pointer; 
      box-shadow:0 0 35px rgba(255,51,102,0.8); transition:all 0.4s;
    }
    .candle::before { 
      content:''; position:absolute; top:-32px; left:50%; transform:translateX(-50%); 
      width:26px; height:36px; background:#ffdd88; border-radius:50% 50% 35% 35%; 
      box-shadow:0 0 30px #ffdd88, 0 0 55px #ff8800;
    }
    .candle.lit { transform:scale(1.3); box-shadow:0 0 70px #ff3366; }

    /* Runes */
    .runes { display:flex; justify-content:center; gap:70px; margin:80px 0; }
    .rune { 
      width:110px; height:110px; background:#1a0033; border:4px solid #9900ff; 
      border-radius:50%; display:flex; align-items:center; justify-content:center; 
      font-size:1.1em; color:#ffccff; box-shadow:0 0 40px #9900ff; cursor:pointer; 
      transition:all 0.4s; line-height:1.3; text-align:center; padding:10px;
    }
    .rune.correct { box-shadow:0 0 80px #00ffff; border-color:#00ffff; color:#00ffff; transform:scale(1.2); }

    /* Desire Offering */
    #offering { 
      max-width:620px; margin:60px auto; padding:50px; 
      background:rgba(20,0,30,0.95); border:3px solid #ff3366; 
      border-radius:20px; box-shadow:0 0 60px rgba(255,51,102,0.5);
    }
    input { 
      width:100%; padding:18px; font-size:1.3em; background:#111; color:#ffddaa; 
      border:3px solid #ff3366; margin-bottom:30px; text-align:center;
    }
    button { 
      padding:18px 60px; background:#330011; color:#ff3366; border:4px solid #ff3366; 
      font-size:1.5em; cursor:pointer; transition:all 0.3s;
    }
    button:hover { background:#ff3366; color:#0a0008; }

    /* Contract Popup */
    #contractPopup { 
      display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
      background:rgba(10,0,8,0.95); z-index:1000; align-items:center; justify-content:center;
    }
    .popup-content { 
      background:rgba(20,0,30,0.98); border:5px solid #ff3366; border-radius:20px; 
      padding:60px 50px; max-width:700px; box-shadow:0 0 100px #9f00ff; text-align:center;
    }
  </style>
</head>
<body>

  <h1>THE CANDLE RITUAL</h1>
  <p class="subtitle" id="stage-title">Light the three chosen flames</p>

  <!-- CANDLES -->
  <div id="candleStage">
    <div class="candles" id="candlesContainer"></div>
  </div>

  <!-- RUNES -->
  <div id="runeStage" style="display:none">
    <p class="subtitle">Speak the words in the correct order</p>
    <div class="runes" id="runesContainer"></div>
  </div>

  <!-- DESIRE OFFERING -->
  <div id="offeringStage" style="display:none">
    <h1>OFFER YOUR DESIRE</h1>
    <div id="offering">
      <p style="font-size:1.6em; margin-bottom:30px;">What do you crave most?</p>
      <input type="text" id="desireInput" placeholder="Speak your desire...">
      <button onclick="submitDesire()">OFFER IT TO VESPERATH</button>
    </div>
  </div>

  <!-- CONTRACT POPUP -->
  <div id="contractPopup">
    <div class="popup-content">
      <h1 style="color:#ff3366; margin-bottom:20px;">THE CONTRACT IS SEALED</h1>
      <p style="font-size:1.4em; color:#e8d5ff; line-height:1.8;">
        Your desire has been heard.<br><br>
        Vesperath accepts your offering.
      </p>
      <a href="https://forms.gle/xzatapBg9LiMEsxB7" target="_blank" 
         style="display:inline-block; margin-top:40px; padding:20px 60px; background:#ff3366; color:#0a0008; 
                font-size:1.6em; text-decoration:none; border-radius:8px;">
        SIGN THE CONTRACT
      </a>
    </div>
  </div>

  <script>
    const runeNames = ["OBEY", "BLEED", "SUBMIT"];
    let secretSequence = [];
    let currentStep = 0;

    // Create 3 random candles
    function createCandles() {
      const container = document.getElementById('candlesContainer');
      container.innerHTML = '';
      const order = [0,1,2].sort(() => Math.random() - 0.5);
      
      for (let i = 0; i < 3; i++) {
        const candle = document.createElement('div');
        candle.className = 'candle';
        candle.dataset.index = order[i];
        candle.innerHTML = `<div style="position:absolute; bottom:12px; left:50%; transform:translateX(-50%); color:#ffdd88; font-size:2em;">${i+1}</div>`;
        candle.onclick = () => lightCandle(candle);
        container.appendChild(candle);
      }
    }

    function lightCandle(candle) {
      if (candle.classList.contains('lit')) return;
      candle.classList.add('lit');
      
      if (document.querySelectorAll('.candle.lit').length === 3) {
        setTimeout(nextToRunes, 900);
      }
    }

    function nextToRunes() {
      document.getElementById('candleStage').style.display = 'none';
      document.getElementById('runeStage').style.display = 'block';
      document.getElementById('stage-title').textContent = 'Now speak to the runes';
      initRunes();
    }

    // Rune puzzle (fixed secret order every time until solved)
    function initRunes() {
      secretSequence = [...runeNames].sort(() => Math.random() - 0.5);
      currentStep = 0;
      
      const container = document.getElementById('runesContainer');
      container.innerHTML = '';
      
      runeNames.forEach(name => {
        const rune = document.createElement('div');
        rune.className = 'rune';
        rune.textContent = name;
        rune.onclick = () => handleRuneClick(rune, name);
        container.appendChild(rune);
      });
    }

    function handleRuneClick(runeElement, clickedName) {
      if (clickedName === secretSequence[currentStep]) {
        runeElement.classList.add('correct');
        currentStep++;
        
        if (currentStep === 3) {
          setTimeout(nextToOffering, 1200);
        }
      } else {
        // Wrong click → reset glows and progress
        const allRunes = document.querySelectorAll('.rune');
        allRunes.forEach(r => r.classList.remove('correct'));
        currentStep = 0;
      }
    }

    function nextToOffering() {
      document.getElementById('runeStage').style.display = 'none';
      document.getElementById('offeringStage').style.display = 'block';
      document.getElementById('stage-title').textContent = 'Offer your deepest desire';
    }

    function submitDesire() {
      const input = document.getElementById('desireInput').value.trim();
      if (input.length < 5) {
        alert("Your desire must be worthy...");
        return;
      }
      document.getElementById('offeringStage').style.display = 'none';
      document.getElementById('contractPopup').style.display = 'flex';
    }

    // Start everything
    window.onload = createCandles;
  </script>
</body>
</html>
