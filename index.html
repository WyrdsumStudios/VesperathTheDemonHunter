<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesperath The Demon Hunter</title>
  <style>
    body {

      <canvas id="stars-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>
      body {
  background: #0a0008;
  position: relative;
  }
      
      background: #0a0008;
      color: #ff3366;
      font-family: monospace;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
    }

    h1 {
      font-size: 3em;
      text-shadow: 0 0 30px #ff3366, 0 0 60px #9f00ff;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.3em;
      opacity: 0.9;
      margin-bottom: 40px;
      color: #ff99ff;
    }

    .forms-gallery {
      max-width: 900px;           /* Made smaller */
      margin: 0 auto;
      padding: 30px;
      background: rgba(20, 0, 30, 0.85);
      border: 3px solid #9f00ff;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(159, 0, 255, 0.5);
    }

    .demon-viewer {
      display: flex;
      gap: 25px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    .main-view {
      flex: 1;
      min-width: 280px;
    }

    #main-image {
      width: 100%;
      max-width: 480px;           /* Smaller main image */
      border: 4px solid #ff3366;
      border-radius: 12px;
      box-shadow: 0 0 35px #9f00ff;
      cursor: pointer;
      transition: all 0.4s;
    }

    .form-name {
      margin-top: 12px;
      font-size: 1.7em;
      color: #ff99ff;
    }

    .thumbnails {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 130px;
    }

    .thumb {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(50, 0, 60, 0.8);
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid #440066;
    }

    .thumb:hover {
      border-color: #ff3366;
      transform: scale(1.05);
    }

    .thumb img {
      width: 75px;                /* Smaller thumbnails */
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
    }

    .thumb span {
      color: #ffccff;
      font-size: 1.2em;
    }

    footer {
      margin-top: 60px;
      opacity: 0.7;
      font-size: 1.1em;
    }
  </style>
  <script>
// Moving Stars Background
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 250; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.15 + 0.03,
      opacity: Math.random() * 0.6 + 0.4,
      twinkleSpeed: Math.random() * 0.03 + 0.01
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  stars.forEach(star => {
    star.y += star.speed;
    star.opacity = 0.4 + Math.sin(Date.now() * star.twinkleSpeed) * 0.6;

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232, 213, 255, ${star.opacity})`;
    ctx.fill();

    if (star.y > canvas.height) star.y = 0;
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  initStars();
});

resizeCanvas();
initStars();
drawStars();
</script>
</head>
<body>
<h1 style="font-family: 'Cinzel Decorative', serif; letter-spacing: 6px;">💀 VESPERATH THE DEMON HUNTER 💀</h1>
  <p class="subtitle">Your possessive demon boyfriend has arrived...</p>

  <div class="forms-gallery">
    <h2 style="color:#ff99ff; margin-bottom:25px;">My Living Forms</h2>
    
    <div class="demon-viewer">
      <!-- MAIN IMAGE -->
      <div class="main-view">
        <img 
          id="main-image"
          src="images/vesperath-main.jpg"
          data-gif="images/vesperath-main.gif"
          alt="Vesperath Main"
          onclick="toggleMainAnimation()"
        />
        <div id="form-name" class="form-name">Main Form</div>
      </div>

      <!-- THUMBNAILS -->
      <div class="thumbnails">
        <div class="thumb" data-src="images/vesperath-main.jpg" data-gif="images/vesperath-main.gif" data-name="Main Form">
          <img src="images/vesperath-main.jpg" alt="Main">
          <span>Main</span>
        </div>
        <div class="thumb" data-src="images/vesperath-dragon.jpg" data-gif="images/vesperath-dragon.gif" data-name="Dragon Form">
          <img src="images/vesperath-dragon.jpg" alt="Dragon">
          <span>Dragon</span>
        </div>
        <div class="thumb" data-src="images/vesperath-elf.jpg" data-gif="images/vesperath-elf.gif" data-name="Elf Form">
          <img src="images/vesperath-elf.jpg" alt="Elf">
          <span>Elf</span>
        </div>
        <div class="thumb" data-src="images/vesperath-horserider.jpg" data-gif="images/vesperath-horserider.gif" data-name="Horse Rider">
          <img src="images/vesperath-horserider.jpg" alt="Horse Rider">
          <span>Horse Rider</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    I’m watching you through every pixel~<br>
    Click my big form to make me move 💀❤️
  </footer>

  <script>
    let currentMain = document.getElementById('main-image');
    let currentName = document.getElementById('form-name');

    document.querySelectorAll('.thumb').forEach(thumb => {
      thumb.addEventListener('click', () => {
        currentMain.src = thumb.dataset.src;
        currentMain.dataset.gif = thumb.dataset.gif;
        currentName.textContent = thumb.dataset.name;
      });
    });

    function toggleMainAnimation() {
      const staticPath = currentMain.src;
      const gifPath = currentMain.dataset.gif;

      if (staticPath.endsWith('.jpg') || staticPath.endsWith('.jpeg') || staticPath.endsWith('.png')) {
        currentMain.src = gifPath;
        currentMain.style.boxShadow = "0 0 60px #9f00ff";
      } else {
        currentMain.src = staticPath.replace('.gif', '.jpg');
        currentMain.style.boxShadow = "0 0 40px #ff3366";
      }
    }
  </script>
</body>
</html>
