<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Contract — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      padding:0; 
      margin:0; 
      min-height:100vh; 
      overflow-x:hidden;
    }

    .main-nav { 
      text-align:center; padding:25px 0; 
      background:rgba(10,0,8,0.95); 
      border-bottom:1px solid #330011; 
    }
    .nav-links { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
    .nav-link { 
      padding:12px 28px; color:#e8d5ff; text-decoration:none; 
      border:1px solid rgba(255,51,102,0.3); font-size:0.95em; letter-spacing:3px;
      transition:all 0.4s;
    }
    .nav-link:hover, .nav-link.active { border-color:#ff3366; color:#ff3366; }

    h1 { 
      font-size:4.5em; 
      letter-spacing:12px; 
      margin:60px 0 20px; 
      text-shadow:0 0 30px #ff3366;
    }

    .cryptic-box { 
      max-width:680px; 
      margin:40px auto; 
      padding:40px 50px; 
      background:rgba(15,0,20,0.85); 
      border:2px solid #660022; 
      border-radius:12px; 
      font-size:1.45em; 
      line-height:1.9; 
      color:#e8d5ff;
    }

    .chalice { 
      font-size:12em; 
      margin:40px 0 30px; 
      filter: drop-shadow(0 0 50px #ff3366); 
      line-height:1;
    }

    .surrender { 
      font-size:2.1em; 
      color:#ff99ff; 
      margin:20px 0 50px; 
      letter-spacing:4px;
    }

    input { 
      width:100%; max-width:520px; 
      padding:22px; 
      font-size:1.8em; 
      background:#0f0a14; 
      color:#ffddaa; 
      border:4px solid #ff3366; 
      border-radius:8px; 
      text-align:center;
    }

    .emoji-picker { 
      display:flex; justify-content:center; gap:22px; flex-wrap:wrap; margin:35px 0 40px; 
    }
    .emoji { font-size:3.2em; cursor:pointer; padding:8px; transition:all 0.3s; }
    .emoji:hover, .emoji.selected { transform:scale(1.45); }

    button { 
      padding:24px 90px; 
      background:transparent; 
      color:#ff3366; 
      border:4px solid #ff3366; 
      font-size:1.85em; 
      letter-spacing:4px; 
      cursor:pointer; 
      transition:all 0.4s;
    }
    button:hover { background:#ff3366; color:#0a0008; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-links">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="origin.html" class="nav-link">ORIGIN</a>
      <a href="contract.html" class="nav-link active">CONTRACT</a>
      <a href="candle-ritual.html" class="nav-link">CANDLE RITUAL</a>
    </div>
  </nav>

  <h1>THE CONTRACT</h1>

  <div class="cryptic-box" id="crypticText">
    Your soul is already whispering my name...
  </div>

  <button onclick="nextCryptic()">Tell me more, Vesperath...</button>

  <div class="chalice">🩸</div>

  <p class="surrender">I SURRENDER TO VESPERATH</p>

  <input type="text" id="nameInput" placeholder="YOUR NAME">

  <div class="emoji-picker" id="emojiPicker"></div>

  <button onclick="signContract()">SEAL THE CONTRACT</button>

  <h2 style="margin-top:100px; color:#c8a96e; letter-spacing:6px;">THE BOUND</h2>
  <div id="signed-list" style="max-width:700px; margin:30px auto; padding:0 20px;"></div>

  <script>
    const messages = [
      "Your soul is already whispering my name...",
      "Desire is the chain. Surrender is the key.",
      "The deeper your craving, the tighter my hold.",
      "There is no shame in wanting. Only in denying it.",
      "Speak your truth. The void is listening.",
      "Once you sign, there is no undoing what you offer."
    ];
    let index = 0;

    function nextCryptic() {
      index = (index + 1) % messages.length;
      document.getElementById('crypticText').textContent = messages[index];
    }

    const emojis = ["🐉","🐺","🦇","🐍","🦂","🌹","🔥","🌑","🕸️","🖤","🩸","⚔️"];
    function populateEmojis() {
      const container = document.getElementById('emojiPicker');
      emojis.forEach(emo => {
        const span = document.createElement('span');
        span.className = 'emoji';
        span.textContent = emo;
        span.onclick = () => {
          document.querySelectorAll('.emoji').forEach(e => e.classList.remove('selected'));
          span.classList.add('selected');
        };
        container.appendChild(span);
      });
    }

    function signContract() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert("Your name is required...");

      const emoji = document.querySelector('.emoji.selected') ? 
                   document.querySelector('.emoji.selected').textContent : "🖤";

      const now = new Date();
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const date = `${months[now.getMonth()]} ${now.getDate()}`;

      const entry = document.createElement('div');
      entry.style = "padding:16px 0; border-bottom:1px dashed rgba(255,51,102,0.3); font-size:1.4em;";
      entry.innerHTML = `<strong>${name}</strong> — ${date} — ${emoji}`;
      document.getElementById('signed-list').prepend(entry);

      document.getElementById('nameInput').value = '';
      document.querySelectorAll('.emoji').forEach(e => e.classList.remove('selected'));
    }

    window.onload = populateEmojis;
  </script>
</body>
</html>
