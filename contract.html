<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Contract — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0a0008;
      color: #ff3366;
      font-family: 'Cinzel Decorative', serif;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    canvas#stars-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    h1 {
      font-size: 4.2em;
      letter-spacing: 12px;
      text-shadow: 0 0 30px #ff3366, 0 0 70px #9f00ff;
      margin: 30px 0 10px;
    }

    .esroth-container {
      margin: 20px auto 30px;
      max-width: 700px;
    }
    .esroth {
      width: 100%;
      max-height: 380px;
      object-fit: contain;
      filter: drop-shadow(0 0 40px #9f00ff);
      border-radius: 12px;
      transition: filter 0.4s;
    }
    .esroth:hover {
      filter: drop-shadow(0 0 70px #ff3366);
    }

    .chalice {
      font-size: 8.5em;
      margin: 20px 0 40px;
      filter: drop-shadow(0 0 50px #ff3366);
    }

    .mark-display {
      font-size: 7em;
      margin: 30px auto 35px;
      width: 170px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,51,102,0.08);
      border: 5px solid #ff3366;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(255,51,102,0.5);
      transition: all 0.4s;
    }
    .mark-display:hover {
      transform: scale(1.12);
      box-shadow: 0 0 70px #ff99ff;
      border-color: #ff99ff;
    }

    .contract-form {
      max-width: 460px;
      margin: 0 auto 60px;
    }

    input[type="text"] {
      width: 100%;
      padding: 20px;
      font-size: 1.5em;
      background: #0f0a14;
      color: #ffddaa;
      border: 4px solid #ff3366;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 30px;
      outline: none;
      transition: all 0.3s;
    }
    input[type="text"]:focus {
      box-shadow: 0 0 30px rgba(255,51,102,0.6);
    }

    button {
      padding: 22px 60px;
      background: transparent;
      color: #ff3366;
      border: 4px solid #ff3366;
      font-size: 1.3em;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.4s;
    }
    button:hover {
      background: #ff3366;
      color: #0a0008;
      box-shadow: 0 0 50px #ff3366;
    }

    .signed-section {
      max-width: 680px;
      margin: 80px auto 0;
    }
    .signed-section h2 {
      color: #c8a96e;
      letter-spacing: 6px;
      margin-bottom: 40px;
      font-size: 2.2em;
    }
    .signature {
      padding: 20px 0;
      border-bottom: 1px dashed rgba(255,51,102,0.4);
      font-size: 1.25em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .signature .sig-animal { font-size: 1.8em; }
    .signature .sig-date { color: #9f00ff; font-size: 0.8em; opacity: 0.8; }

    #animalModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,0,8,0.96);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #animalModal.open { display: flex; }
    .modal-inner {
      background: #1a0033;
      padding: 40px;
      border: 4px solid #ff3366;
      max-width: 580px;
      width: 90%;
      border-radius: 16px;
    }
    .modal-inner h2 {
      color: #ff99ff;
      margin-bottom: 30px;
    }
    #animalGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .animal-option {
      font-size: 3.2em;
      padding: 12px;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .animal-option:hover {
      background: rgba(255,51,102,0.2);
      transform: scale(1.2);
    }
    .animal-option.selected {
      background: rgba(159,0,255,0.3);
      border: 2px solid #9f00ff;
    }

    .sealing {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,51,102,0.3) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 2000;
      transition: opacity 1.2s;
    }
    .sealing.active { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>

  <h1>💀 THE CONTRACT 💀</h1>

  <div class="esroth-container">
    <img src="images/esroth.jpg" data-gif="images/esroth.gif" alt="Esroth" class="esroth" id="esroth-img" onclick="toggleEsroth()">
  </div>

  <span class="chalice">🩸</span>

  <div class="contract-form">
    <div class="mark-display" id="randomMark" onclick="openModal()"></div>
    <input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="60">
    <button onclick="signContract()">🩸 SEAL THE CONTRACT</button>
  </div>

  <div class="signed-section">
    <h2>THE BOUND</h2>
    <div id="signed-list"></div>
  </div>

  <div id="sealingOverlay" class="sealing"></div>

  <div id="animalModal">
    <div class="modal-inner">
      <h2>Choose Your Mark</h2>
      <div id="animalGrid"></div>
      <button onclick="closeModal()" style="margin-top:25px; padding:14px 40px;">Close</button>
    </div>
  </div>

  <script>
    // Stars
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    function initStars() {
      stars = [];
      for (let i = 0; i < 220; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.6 + 0.4,
          speed: Math.random() * 0.2 + 0.05,
          tw: Math.random() * Math.PI * 2
        });
      }
    }
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s => {
        s.y += s.speed;
        s.tw += 0.03;
        const a = 0.4 + Math.sin(s.tw) * 0.5;
        ctx.fillStyle = `rgba(232,213,255,${a})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
        if (s.y > canvas.height) s.y = 0;
      });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); draw();

    // Esroth
    function toggleEsroth() {
      const img = document.getElementById('esroth-img');
      if (img.src.endsWith('.jpg')) img.src = img.dataset.gif;
      else img.src = img.src.replace('.gif','.jpg');
    }

    // Animals
    const animals = ["🐉","🐺","🦇","🐍","🦂","🌹","🔥","🦋","🕸️","🖤","⚔️","🩸"];
    let chosenAnimal = "";

    function setRandomMark() {
      chosenAnimal = animals[Math.floor(Math.random()*animals.length)];
      document.getElementById('randomMark').textContent = chosenAnimal;
    }

    // Modal
    function openModal() {
      const grid = document.getElementById('animalGrid');
      grid.innerHTML = '';
      animals.forEach(animal => {
        const d = document.createElement('div');
        d.className = 'animal-option' + (animal === chosenAnimal ? ' selected' : '');
        d.textContent = animal;
        d.onclick = () => {
          chosenAnimal = animal;
          document.getElementById('randomMark').textContent = animal;
          closeModal();
        };
        grid.appendChild(d);
      });
      document.getElementById('animalModal').classList.add('open');
    }
    function closeModal() {
      document.getElementById('animalModal').classList.remove('open');
    }

    // Sign
    function signContract() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert("Please enter your name.");

      const saved = JSON.parse(localStorage.getItem('vesperath-bound') || '[]');
      if (saved.some(s => s.name.toLowerCase() === name.toLowerCase())) {
        return alert("Your soul is already bound...");
      }

      const seal = document.getElementById('sealingOverlay');
      seal.classList.add('active');
      setTimeout(() => seal.classList.remove('active'), 1000);

      const list = document.getElementById('signed-list');
      const entry = document.createElement('div');
      entry.className = 'signature';
      entry.innerHTML = `\( {chosenAnimal ? `<span class="sig-animal"> \){chosenAnimal}</span>` : ''}<strong>\( {name}</strong><span class="sig-date"> \){new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`;
      list.prepend(entry);

      saved.unshift({name, animal: chosenAnimal, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})});
      localStorage.setItem('vesperath-bound', JSON.stringify(saved));

      document.getElementById('nameInput').value = '';
      setRandomMark();
    }

    function loadSaved() {
      const saved = JSON.parse(localStorage.getItem('vesperath-bound') || '[]');
      const list = document.getElementById('signed-list');
      list.innerHTML = '';
      saved.forEach(s => {
        const e = document.createElement('div');
        e.className = 'signature';
        e.innerHTML = `\( {s.animal ? `<span class="sig-animal"> \){s.animal}</span>` : ''}<strong>\( {s.name}</strong><span class="sig-date"> \){s.date}</span>`;
        list.appendChild(e);
      });
    }

    window.onload = () => {
      setRandomMark();
      loadSaved();
    };
  </script>
</body>
</html>
