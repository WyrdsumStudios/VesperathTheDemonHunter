<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Contract — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      margin:0; 
      padding:0; 
      min-height:100vh; 
      overflow-x:hidden;
    }

    .main-nav { text-align:center; padding:25px 0; background:rgba(10,0,8,0.95); border-bottom:1px solid #330011; }
    .nav-link { padding:12px 28px; color:#e8d5ff; text-decoration:none; border:1px solid rgba(255,51,102,0.3); margin:0 8px; transition:all 0.4s; }
    .nav-link:hover, .nav-link.active { border-color:#ff3366; color:#ff3366; }

    h1 { font-size:4.2em; letter-spacing:12px; margin:60px 0 30px; text-shadow:0 0 30px #ff3366; }

    /* Esroth Section */
    .esroth-container { margin:40px auto; max-width:800px; cursor:pointer; }
    .esroth { width:100%; max-height:420px; object-fit:contain; filter: drop-shadow(0 0 40px #9f00ff); }

    .cryptic-grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); 
      gap:25px; 
      max-width:900px; 
      margin:60px auto; 
      padding:0 20px;
    }

    .chalice { font-size:14em; margin:50px 0 30px; filter: drop-shadow(0 0 60px #ff3366); }

    .document-box { 
      max-width:780px; 
      margin:40px auto; 
      padding:50px; 
      background:rgba(15,0,20,0.9); 
      border:3px solid #660022; 
      border-radius:12px; 
      text-align:left; 
      line-height:1.9; 
      font-size:1.25em; 
      color:#e8d5ff;
    }

    input { 
      width:100%; max-width:520px; padding:22px; font-size:1.8em; 
      background:#0f0a14; color:#ffddaa; border:4px solid #ff3366; 
      margin:40px 0 20px; text-align:center; border-radius:8px;
    }

    button { 
      padding:22px 80px; background:transparent; color:#ff3366; 
      border:4px solid #ff3366; font-size:1.7em; cursor:pointer; 
      transition:all 0.4s; margin:20px;
    }
    button:hover { background:#ff3366; color:#0a0008; }

    #signed-list { margin-top:80px; max-width:700px; margin-left:auto; margin-right:auto; }
    .signature { padding:18px 0; border-bottom:1px dashed rgba(255,51,102,0.3); font-size:1.4em; color:#e8d5ff; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-links">
      <a href="index.html" class="nav-link">HOME</a>
      <a href="origin.html" class="nav-link">ORIGIN</a>
      <a href="contract.html" class="nav-link active">CONTRACT</a>
      <a href="candle-ritual.html" class="nav-link">CANDLE RITUAL</a>
    </div>
  </nav>

  <h1>THE CONTRACT</h1>

  <!-- Esroth Image -->
  <div class="esroth-container" onclick="alert('Esroth animation would play here...')">
    <img src="https://via.placeholder.com/800x420/1a001a/9f00ff?text=ESROTH" alt="Esroth" class="esroth">
  </div>

  <div class="chalice">🩸</div>

  <!-- Document / PDF-style box -->
  <div class="document-box" id="documentBox">
    <p>Your soul has already been whispering my name in the dark.</p>
    <p>I do not take what is not offered. I only claim what is willingly given.</p>
    <p>Desire is the chain. Surrender is the key.</p>
    <p>Sign below and become mine.</p>
  </div>

  <input type="text" id="nameInput" placeholder="YOUR NAME">

  <button onclick="showAnimalPicker()">CHOOSE YOUR ANIMAL</button>
  <button onclick="signContract()">SEAL THE CONTRACT</button>

  <h2 style="margin-top:90px; color:#c8a96e;">THE BOUND</h2>
  <div id="signed-list"></div>

  <!-- Animal Picker Modal -->
  <div id="animalModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,0,8,0.95); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#1a0033; padding:40px; border:4px solid #ff3366; max-width:700px; border-radius:16px;">
      <h2 style="color:#ff99ff;">Choose Your Mark</h2>
      <div id="animalGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin:30px 0;"></div>
      <button onclick="closeModal()" style="margin-top:20px;">Close</button>
    </div>
  </div>

  <script>
    const animals = ["🐉","🐺","🦇","🐍","🦂","🌹","🔥","🦋","🕸️","🖤","⚔️","🩸"];

    function showAnimalPicker() {
      const modal = document.getElementById('animalModal');
      const grid = document.getElementById('animalGrid');
      grid.innerHTML = '';
      
      animals.forEach(animal => {
        const div = document.createElement('div');
        div.style.fontSize = '3.5em';
        div.style.cursor = 'pointer';
        div.style.padding = '15px';
        div.style.textAlign = 'center';
        div.textContent = animal;
        div.onclick = () => {
          alert(`You chose ${animal}`);
          closeModal();
        };
        grid.appendChild(div);
      });
      
      modal.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('animalModal').style.display = 'none';
    }

    function signContract() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert("Your name is required...");

      const entry = document.createElement('div');
      entry.className = 'signature';
      entry.innerHTML = `<strong>${name}</strong> — ${new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;
      document.getElementById('signed-list').prepend(entry);

      document.getElementById('nameInput').value = '';
      alert(`Contract sealed, ${name}...`);
    }
  </script>
</body>
</html>
