<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Contract — Vesperath</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { 
      background:#0a0008; 
      color:#ff3366; 
      font-family:'Cinzel Decorative',serif; 
      text-align:center; 
      padding:40px 20px; 
      margin:0; 
      min-height:100vh; 
      position:relative; 
      overflow-x:hidden;
    }

    /* Navigation */
    .main-nav { text-align:center; margin:20px 0 50px; }
    .realm-text { 
      font-size:0.7em; letter-spacing:8px; color:#c8a96e; 
      opacity:0.65; margin-bottom:12px; 
    }
    .nav-links { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
    .nav-link { 
      font-size:0.9em; letter-spacing:4px; color:#e8d5ff; text-decoration:none; 
      padding:12px 28px; border:1px solid rgba(255,51,102,0.3); transition:all 0.4s;
    }
    .nav-link:hover, .nav-link.active { 
      border-color:#ff3366; color:#ff3366; box-shadow:0 0 15px #ff3366; 
    }

    h1 { 
      font-size:4.8em; 
      letter-spacing:12px; 
      text-shadow:0 0 40px #ff3366, 0 0 90px #9f00ff, 0 0 120px #ff3366; 
      margin:20px 0 15px; 
    }
    .subtitle { 
      font-size:1.6em; 
      color:#ff99ff; 
      margin-bottom:60px; 
      opacity:0.85; 
      letter-spacing:3px;
    }

    .contract-box { 
      max-width:760px; 
      margin:40px auto; 
      padding:60px 50px; 
      background:linear-gradient(135deg, rgba(20,0,30,0.95), rgba(10,0,15,0.98)); 
      border:5px solid #9f00ff; 
      border-radius:24px; 
      box-shadow:0 0 80px rgba(159,0,255,0.6), inset 0 0 60px rgba(255,51,102,0.2);
    }

    input { 
      width:100%; 
      padding:20px; 
      font-size:1.6em; 
      background:#0f0a14; 
      color:#ffddaa; 
      border:3px solid #ff3366; 
      margin:30px 0; 
      text-align:center; 
      border-radius:8px;
    }

    .emoji-picker { 
      display:flex; 
      justify-content:center; 
      gap:18px; 
      flex-wrap:wrap; 
      margin:35px 0 40px; 
    }
    .emoji { 
      font-size:2.8em; 
      cursor:pointer; 
      padding:10px; 
      transition:all 0.3s; 
      filter: drop-shadow(0 0 8px #ff3366);
    }
    .emoji:hover, .emoji.selected { 
      transform:scale(1.5); 
      filter: drop-shadow(0 0 20px #ff99ff); 
    }

    button { 
      padding:22px 80px; 
      background:transparent; 
      color:#ff3366; 
      border:4px solid #ff3366; 
      font-size:1.8em; 
      letter-spacing:4px; 
      cursor:pointer; 
      transition:all 0.4s;
    }
    button:hover { 
      background:#ff3366; 
      color:#0a0008; 
      box-shadow:0 0 60px #ff3366; 
    }

    #signed-list { 
      margin-top:80px; 
      max-width:700px; 
      margin-left:auto; 
      margin-right:auto; 
    }
    .signature { 
      padding:18px 0; 
      border-bottom:1px dashed rgba(255,51,102,0.3); 
      font-size:1.35em; 
      color:#e8d5ff; 
      text-align:left;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="main-nav">
    <p class="realm-text">THE VOID AWAITS</p>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="origin.html" class="nav-link">Origin</a>
      <a href="contract.html" class="nav-link active">Contract</a>
      <a href="candle-ritual.html" class="nav-link">Candle Ritual</a>
    </div>
  </nav>

  <h1>THE CONTRACT</h1>
  <p class="subtitle">Speak your name and seal your desire</p>

  <div class="contract-box">
    <p style="font-size:1.8em; margin-bottom:30px; color:#ff99ff;">I surrender to Vesperath</p>
    
    <input type="text" id="nameInput" placeholder="YOUR NAME" maxlength="35">

    <div class="emoji-picker" id="emojiPicker"></div>

    <button onclick="signContract()">SEAL THE CONTRACT</button>
  </div>

  <h2 style="color:#c8a96e; margin-top:90px; letter-spacing:4px;">THE BOUND</h2>
  <div id="signed-list"></div>

  <script>
    const emojis = ["🐉","🐺","🦇","🐍","🦋","🦂","🐦‍⬛","🌹","🔥","🌑","🕸️","🖤"];

    function populateEmojis() {
      const container = document.getElementById('emojiPicker');
      emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji';
        span.textContent = emoji;
        span.onclick = () => {
          document.querySelectorAll('.emoji').forEach(e => e.classList.remove('selected'));
          span.classList.add('selected');
        };
        container.appendChild(span);
      });
    }

    function signContract() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        alert("Your name is required to bind the contract...");
        return;
      }

      const selectedEmoji = document.querySelector('.emoji.selected') ? 
                           document.querySelector('.emoji.selected').textContent : "🖤";

      const now = new Date();
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const dateStr = `${months[now.getMonth()]} ${now.getDate()}`;

      const entry = document.createElement('div');
      entry.className = 'signature';
      entry.innerHTML = `<strong>${name}</strong> — ${dateStr} — ${selectedEmoji}`;

      document.getElementById('signed-list').prepend(entry);

      // Reset form
      document.getElementById('nameInput').value = '';
      document.querySelectorAll('.emoji').forEach(e => e.classList.remove('selected'));

      alert(`It is done, ${name}... The contract is sealed.`);
    }

    window.onload = populateEmojis;
  </script>
</body>
</html>
