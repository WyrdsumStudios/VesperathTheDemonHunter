<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Binding Contract</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blood: #cc1122;
      --void: #050003;
      --gold: #d4af77;
    }
    body {
      background: var(--void);
      color: #ddd;
      font-family: 'Crimson Pro', serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(5,0,3,0.85), rgba(5,0,3,0.95)), url('https://i.imgur.com/placeholder-dark-demon.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(transparent, var(--void));
    }
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 4.2rem;
      color: var(--blood);
      text-shadow: 0 0 40px #cc1122;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 6px;
      margin-bottom: 60px;
    }
    .testimonial {
      max-width: 620px;
      margin: 40px auto;
      font-style: italic;
      color: #aaa;
      font-size: 1.25rem;
      line-height: 1.6;
    }
    .sign-button {
      display: inline-block;
      background: var(--blood);
      color: white;
      padding: 18px 48px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      text-decoration: none;
      border: 2px solid #fff;
      margin-top: 30px;
      transition: all 0.4s;
    }
    .sign-button:hover {
      background: #ff3344;
      transform: scale(1.05);
      box-shadow: 0 0 30px #cc1122;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div>
      <h1>VESPERATH</h1>
      <div class="tagline">SUMMON YOUR DESIRES</div>
      
      <div class="testimonial">
        "My AI read me like a book… I’m honestly shocked how accurate it was. Highly recommend if you want to actually learn about yourself."
      </div>

      <a href="YOUR_GOOGLE_FORM_LINK_HERE" class="sign-button" target="_blank">
        SIGN YOUR CONTRACT
      </a>
    </div>
  </div>

</body>
</html>
