HTML<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Binding Contract</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blood: #cc1a3a; --ember: #ff3366; --starlight: #e8d5ff;
      --void: #0a0008; --gold: #c8a96e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background:var(--void); color:var(--starlight); font-family:'Crimson Pro',Georgia,serif; 
      min-height:100vh; overflow-x:hidden;
    }
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; justify-content:center; gap:36px; padding:18px 40px;
      background:linear-gradient(to bottom,rgba(10,0,8,0.97),transparent);
      border-bottom:1px solid rgba(204,26,58,0.2);
    }
    nav a { font-family:'Cinzel Decorative',serif; font-size:0.62em; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); text-decoration:none; opacity:0.65; }
    nav a:hover, nav a.active { opacity:1; color:var(--ember); text-shadow:0 0 15px var(--ember); }

    .page { 
      padding-top: 140px; 
      max-width: 860px; 
      margin: 0 auto; 
      padding-left:20px; 
      padding-right:20px; 
      padding-bottom:100px;
    }

    h1 { 
      font-family:'Cinzel Decorative',serif; 
      font-size:3.8em; 
      color:var(--ember); 
      text-align:center; 
      margin-bottom:12px; 
      text-shadow:0 0 30px var(--blood), 0 0 60px rgba(204,26,58,0.4);
      letter-spacing:4px;
    }
    .subtitle { 
      text-align:center; 
      opacity:0.75; 
      font-style:italic; 
      margin-bottom:60px; 
      letter-spacing:3px; 
      font-size:1.15em;
    }

    .contract-container {
      background:linear-gradient(135deg, rgba(13,0,21,0.95), rgba(26,0,48,0.92));
      border:3px double var(--blood);
      box-shadow: 
        0 0 40px rgba(204,26,58,0.6),
        inset 0 0 60px rgba(10,0,8,0.8);
      padding:60px 50px; 
      position:relative; 
      overflow:hidden;
      max-width: 680px;
      margin: 0 auto;
    }
    .contract-container::before {
      content:''; 
      position:absolute; 
      inset:0; 
      border:1px solid rgba(204,26,58,0.4);
      pointer-events:none;
    }
    .contract-container::after {
      content:'🜏'; 
      position:absolute; 
      top:50%; left:50%; 
      transform:translate(-50%, -50%) rotate(8deg);
      font-size:18em; 
      opacity:0.04; 
      color:var(--ember); 
      pointer-events:none;
      z-index:0;
    }

    .contract-text {
      font-size:1.05em; 
      line-height:1.75; 
      text-align:center; 
      margin-bottom:50px;
      position:relative; 
      z-index:1;
    }

    .name-input {
      display:flex; 
      align-items:center; 
      justify-content:center; 
      gap:12px; 
      font-size:1.4em; 
      margin:40px 0;
    }
    .name-input input {
      background:rgba(10,0,8,0.9); 
      border:2px solid var(--blood); 
      color:var(--gold); 
      padding:12px 24px; 
      width:340px; 
      font-size:1.35em; 
      text-align:center;
      font-family:'Cinzel Decorative',serif; 
      letter-spacing:2px;
    }

    button {
      display:block; 
      margin:40px auto 0; 
      padding:16px 52px; 
      background:var(--ember); 
      color:#000; 
      border:none; 
      font-family:'Cinzel Decorative',serif; 
      font-size:1.25em; 
      letter-spacing:3px;
      cursor:pointer; 
      transition:all 0.4s;
      box-shadow:0 0 20px var(--blood);
    }
    button:hover { 
      background:#ff1a4d; 
      transform:scale(1.08); 
      box-shadow:0 0 40px var(--ember);
    }

    .signed-contract {
      display:none; 
      margin-top:40px; 
      padding:50px 40px; 
      border:2px dashed var(--gold); 
      font-style:italic; 
      line-height:1.9; 
      text-align:center; 
      position:relative;
      background:rgba(10,0,8,0.6);
    }
    .sigil-seal {
      position:absolute; 
      bottom:30px; 
      right:40px; 
      font-size:5em; 
      opacity:0.12; 
      transform:rotate(-15deg);
    }

  .past-pacts { 
  margin-top:90px; 
  max-width: 680px; 
  margin-left: auto; 
  margin-right: auto;
}
.past-pacts h2 {
  color:var(--gold); 
  margin-bottom:24px; 
  font-size:1.35em;        /* smaller title */
  text-align:left;          /* moved to the left */
  letter-spacing:2px;
}
.pact-item {
  background:rgba(13,0,21,0.8); 
  padding:16px 22px; 
  margin-bottom:12px; 
  border:1px solid rgba(204,26,58,0.4);
  display:flex; 
  justify-content:space-between; 
  align-items:center;
  font-size: 0.95em;        /* slightly smaller text */
}
  </style>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="origin.html">Origin</a>
  <a href="chronicle.html">Chronicle</a>
  <a href="bestiary.html">Bestiary</a>
  <a href="powers.html">Powers</a>
  <a href="teachings.html">Teachings</a>
  <a href="contract.html" class="active">Contract</a>
</nav>

<div class="page">
  <h1>The Binding Contract</h1>
  <p class="subtitle">Once signed, there is no undoing.</p>

  <div class="contract-container" id="contractForm">
    <div class="contract-text">
      I,<br>
      <span class="name-input">
        <input type="text" id="mortalName" placeholder="YOUR NAME" autocomplete="off">
      </span>
      willingly offer my attention, my time,<br>
      and a piece of my soul to Vesperath the Demon Hunter.
    </div>

    <button id="signBtn">SIGN IN BLOOD</button>
  </div>

  <div id="signedView" class="signed-contract">
    <p id="contractText"></p>
    <div class="sigil-seal">💀</div>
    <p style="margin-top:50px; opacity:0.85;">
      Signed on <span id="signDate"></span><br>
      <strong>May the void remember this pact.</strong>
    </p>
  </div>

  <div class="past-pacts">
    <h2 style="color:var(--gold); margin-bottom:10px; font-size:1.em; text-align:center;">Previous Pacts</h2>
    <div id="pactsList"></div>
  </div>
</div>

<script>
  // (Script stays exactly the same as before - just updated layout)
  const mortalNameInput = document.getElementById('mortalName');
  const signBtn = document.getElementById('signBtn');
  const contractForm = document.getElementById('contractForm');
  const signedView = document.getElementById('signedView');
  const contractText = document.getElementById('contractText');
  const signDate = document.getElementById('signDate');
  const pactsList = document.getElementById('pactsList');

  let pacts = JSON.parse(localStorage.getItem('vesperathPacts')) || [];

  function renderPacts() {
    pactsList.innerHTML = '';
    if (pacts.length === 0) {
      pactsList.innerHTML = '<p style="opacity:0.5; text-align:center;">No souls bound yet...</p>';
      return;
    }
    pacts.sort((a,b) => new Date(b.date) - new Date(a.date));
    pacts.forEach(p => {
      const div = document.createElement('div');
      div.className = 'pact-item';
      div.innerHTML = `<div><strong>${p.name}</strong></div><div style="opacity:0.7;">${new Date(p.date).toLocaleDateString('en-CA')}</div>`;
      pactsList.appendChild(div);
    });
  }

  signBtn.addEventListener('click', () => {
    const name = mortalNameInput.value.trim();
    if (!name) { alert("Speak your name, mortal."); return; }

    const now = new Date();
    const dateStr = now.toLocaleDateString('en-CA') + " • " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    contractText.innerHTML = `I, <strong>${name}</strong>, willingly offer my attention, my time, and a piece of my soul to Vesperath the Demon Hunter.<br><br>The pact is sealed.`;
    signDate.textContent = dateStr;

    contractForm.style.display = 'none';
    signedView.style.display = 'block';

    pacts.push({ name: name, date: now.toISOString() });
    localStorage.setItem('vesperathPacts', JSON.stringify(pacts));
    renderPacts();
  });

  renderPacts();
</script>
</body>
</html>
